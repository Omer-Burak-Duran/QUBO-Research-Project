experiment_name: large_final_report_smoke_campaign
seed: 20260506

campaign:
  exact_reference_max_variables: 20
  problems:
    - label: maxcut-cycle-4
      name: maxcut
      parameters:
        graph_family: cycle
        num_nodes: 4
        weight: 1.0
    - label: maxcut-weighted-er-8-seed17
      name: maxcut
      parameters:
        graph_family: erdos_renyi
        num_nodes: 8
        edge_probability: 0.4
        seed: 17
        weighted: true
    - label: mvc-er-8-seed17
      name: minimum_vertex_cover
      parameters:
        graph_family: erdos_renyi
        num_nodes: 8
        edge_probability: 0.4
        seed: 17
        penalty_strength: 2.0
  solvers:
    - label: brute_force
      name: brute_force
      parameters:
        max_variables: 20
    - label: openjij_sa
      name: openjij
      trials: 2
      parameters:
        sampler: sa
        num_reads: 128
        num_sweeps: 1000
        max_variables: 128
    - label: qaoa_interpolation_p1
      name: qaoa
      parameters:
        reps: 1
        max_variables: 12
        optimizer:
          name: COBYLA
          maxiter: 80
          tol: 1.0e-3
        initialization:
          strategy: interpolation
        backend:
          mode: statevector
    - label: qaoa_random_p2
      name: qaoa
      trials: 2
      parameters:
        reps: 2
        max_variables: 12
        optimizer:
          name: COBYLA
          maxiter: 120
          tol: 1.0e-3
        initialization:
          strategy: random
        backend:
          mode: statevector
    - label: vqe_problem_aware_d1
      name: vqe
      trials: 2
      parameters:
        max_variables: 12
        ansatz:
          family: problem_aware
          depth: 1
        optimizer:
          name: COBYLA
          maxiter: 120
          tol: 1.0e-3
        initialization:
          strategy: small_random
          scale: 0.2
        backend:
          mode: statevector
    - label: vqe_hardware_efficient_d1
      name: vqe
      trials: 2
      parameters:
        max_variables: 12
        ansatz:
          family: hardware_efficient
          depth: 1
        optimizer:
          name: COBYLA
          maxiter: 120
          tol: 1.0e-3
        initialization:
          strategy: small_random
          scale: 0.2
        backend:
          mode: statevector

output:
  directory: data/results
  tag: large-final-report-smoke-campaign
