experiment_name: qaoa_maxcut_cycle_noisy
seed: 7

problem:
  name: maxcut
  parameters:
    graph_family: cycle
    num_nodes: 4
    weight: 1.0

solver:
  name: qaoa
  parameters:
    reps: 1
    max_variables: 12
    backend:
      mode: noisy
      shots: 4096
      noise_model_name: depolarizing_readout
      seed: 7
    optimizer:
      name: COBYLA
      maxiter: 60
      tol: 1.0e-3
    initialization:
      strategy: interpolation
      seed: 7

output:
  directory: data/results
  tag: qaoa-maxcut-noisy
