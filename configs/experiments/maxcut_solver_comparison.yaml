experiment_name: maxcut_solver_comparison
seed: 7

problem:
  name: maxcut
  parameters:
    graph_family: cycle
    num_nodes: 4
    weight: 1.0

comparison:
  solvers:
    - label: brute_force
      name: brute_force
      parameters:
        max_variables: 20
      trials: 1
    - label: openjij
      name: openjij
      parameters:
        sampler: sa
        num_reads: 64
        num_sweeps: 1000
        seed: 7
        max_variables: 128
      trials: 1
    - label: qaoa
      name: qaoa
      parameters:
        reps: 1
        max_variables: 12
        optimizer:
          name: COBYLA
          maxiter: 40
          tol: 1.0e-3
        initialization:
          strategy: interpolation
          seed: 7
      trials: 1
    - label: vqe
      name: vqe
      parameters:
        max_variables: 12
        ansatz:
          family: problem_aware
          depth: 1
        optimizer:
          name: COBYLA
          maxiter: 80
          tol: 1.0e-3
        initialization:
          strategy: small_random
          seed: 7
          scale: 0.2
      trials: 1

output:
  directory: data/results
  tag: maxcut-solver-comparison
