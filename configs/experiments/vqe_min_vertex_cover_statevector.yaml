experiment_name: vqe_min_vertex_cover_cycle_statevector
seed: 7

problem:
  name: minimum_vertex_cover
  parameters:
    graph_family: cycle
    num_nodes: 4
    penalty_strength: 2.0

solver:
  name: vqe
  parameters:
    max_variables: 12
    ansatz:
      family: hardware_efficient
      depth: 1
    backend:
      mode: statevector
    optimizer:
      name: COBYLA
      maxiter: 160
      tol: 1.0e-3
    initialization:
      strategy: small_random
      seed: 7
      scale: 0.2

output:
  directory: data/results
  tag: vqe-min-vertex-cover
