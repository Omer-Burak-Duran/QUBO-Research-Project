experiment_name: openjij_min_vertex_cover
seed: 7

problem:
  name: minimum_vertex_cover
  parameters:
    graph_family: cycle
    num_nodes: 4
    penalty_strength: 2.0

solver:
  name: openjij
  parameters:
    sampler: sa
    num_reads: 64
    num_sweeps: 1000
    seed: 7
    max_variables: 128

output:
  directory: data/results
  tag: openjij-min-vertex-cover
