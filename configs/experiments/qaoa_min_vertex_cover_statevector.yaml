experiment_name: qaoa_min_vertex_cover_cycle_statevector
seed: 7

problem:
  name: minimum_vertex_cover
  parameters:
    graph_family: cycle
    num_nodes: 4
    penalty_strength: 2.0

solver:
  name: qaoa
  parameters:
    reps: 1
    max_variables: 12
    backend:
      mode: statevector
    optimizer:
      name: COBYLA
      maxiter: 120
      tol: 1.0e-3
    initialization:
      strategy: interpolation
      seed: 7

output:
  directory: data/results
  tag: qaoa-min-vertex-cover
