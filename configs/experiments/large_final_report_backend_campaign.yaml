experiment_name: large_final_report_backend_campaign
seed: 20260506

campaign:
  exact_reference_max_variables: 20
  problems:
    - label: maxcut-cycle-6
      name: maxcut
      parameters:
        graph_family: cycle
        num_nodes: 6
        weight: 1.0
    - label: maxcut-er-8-seed11
      name: maxcut
      parameters:
        graph_family: erdos_renyi
        num_nodes: 8
        edge_probability: 0.4
        seed: 11
        weighted: false
    - label: maxcut-weighted-er-8-seed17
      name: maxcut
      parameters:
        graph_family: erdos_renyi
        num_nodes: 8
        edge_probability: 0.4
        seed: 17
        weighted: true
    - label: maxcut-weighted-er-10-seed17
      name: maxcut
      parameters:
        graph_family: erdos_renyi
        num_nodes: 10
        edge_probability: 0.4
        seed: 17
        weighted: true
    - label: mvc-cycle-6
