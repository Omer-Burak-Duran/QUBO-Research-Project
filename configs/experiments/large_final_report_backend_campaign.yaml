    - label: qaoa_statevector
      name: qaoa
      trials: 2
      parameters:
        reps: 2
        max_variables: 12
        optimizer:
          name: COBYLA
          maxiter: 180
          tol: 1.0e-3
        initialization:
          strategy: random
        backend:
          mode: statevector
    - label: qaoa_shot_1024
      name: qaoa
      trials: 2
      parameters:
        reps: 2
        max_variables: 12
        optimizer:
          name: COBYLA
          maxiter: 180
          tol: 1.0e-3
        initialization:
