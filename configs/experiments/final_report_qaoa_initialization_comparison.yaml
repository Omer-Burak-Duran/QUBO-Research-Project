experiment_name: final_report_qaoa_initialization_comparison
seed: 20260506

problem:
  name: maxcut
  parameters:
    graph_family: erdos_renyi
    num_nodes: 6
    edge_probability: 0.5
    seed: 11
    weighted: false

solver:
  parameters:
    max_variables: 12
    backend:
      mode: statevector
    optimizer:
      name: COBYLA
      maxiter: 100
      tol: 1.0e-3

comparison:
  reps: [1, 2, 3]
  strategies:
    - interpolation
    - warm_start
    - random
  random_trials: 4
  warm_start_bootstrap_strategy: interpolation

output:
  directory: data/results
  tag: final-report-qaoa-init-compare
